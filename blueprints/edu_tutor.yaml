name: "Tutor & Language School CRM"
industry: "education"
description: "Платформа для языковых школ, кружков и репетиторов. Журнал посещаемости, биллинг (абонемент на месяц) и успеваемость."

modules:
  - id: "class_journal"
    name: "Журнал и Успеваемость"
    type: "frontend"
    features: 
      - "Сетка Группа/Даты со статусами: Присутствовал/Болел/Пропуск"
      - "Проставление оценок и комментариев преподавателя к уроку"
      - "Домашние задания (Трекинг Выполнено/Нет)"
      
  - id: "student_billing"
    name: "Финансы и Абонементы"
    type: "frontend"
    features: 
      - "Калькулятор задолженностей за месяц"
      - "Списание уроков с баланса студента"
      - "Выгрузка квитанций об оплате (PDF/Ссылка)"

  - id: "edu_db"
    name: "БД Школы"
    type: "backend_db"
    models:
      - "Student (ФИО, ДР, Телефон_родителя)"
      - "Group (Название, Уровень, Расписание)"
      - "Tutor (Преподаватель, Ставка/Час)"
      - "Lesson (Дата, Тема, Группа/Индивид)"
      - "Attendance (Связь Student <-> Lesson)"

integrations:
  - id: "telegram_bot"
    name: "Бот для Родителей"
    features:
      - "Рассылка оценок за неделю родителю"
      - "Уведомление о неоплаченном абонементе ('Осталось 2 урока')"

ai_instructions:
  architecture: "React + FastAPI + SQLite"
  design_constraints: "Дружелюбный, мягкий дизайн (EdTech style). Скругленные углы карточек, яркие, но не кричащие цвета (оранжевый, желтый, индиго). Поддержка PWA для быстрого открытия преподом на планшете."
