name: "Dental & Private Clinic Management"
industry: "medical_services"
description: "Медицинская информационная система (МИС) для частных клиник, стоматологий и кабинетов психологов. Поддержка ЭМК (Мед. карт)."

modules:
  - id: "patient_records"
    name: "Электронные Медкарты (ЭМК)"
    type: "frontend"
    features: 
      - "Карточка пациента: Анамнез, Аллергии, История Болезни"
      - "Зубная формула (Интерактивная SVG схема) - если стоматология"
      - "Прикрепление снимков (Рентген/УЗИ) и заключений (PDF)"
      
  - id: "doctor_schedule"
    name: "Расписание Врачей"
    type: "frontend"
    features: 
      - "Таблица приемов на день / неделю по специалистам"
      - "Разделение кабинетов (Кресло 1, Кабинет 2)"
      - "Быстрое занесение нового приема (Пациент -> Услуга -> Время)"

  - id: "med_db"
    name: "БД Клиники"
    type: "backend_db"
    models:
      - "Patient (СНИЛС, ФИО, ДР, Телефон)"
      - "Doctor (Специализация)"
      - "Diagnosis (МКБ-10 код, Описание)"
      - "Appointment (Patient, Doctor, Дата, План Лечения)"
      - "MedicalRecord (Текст осмотра, Прикрепленные файлы)"

integrations:
  - id: "telegram_bot"
    name: "Напоминания & Отзывы"
    features:
      - "Бот-опросник после визита: 'Оцените работу врача от 1 до 5'"

ai_instructions:
  architecture: "React + FastAPI + SQLite"
  design_constraints: "Ультрачистый 'Medical' Дизайн. Белый фон, светло-голубые (Teal/Cyan) элементы интерфейса. Шрифты без засечек (Inter, Roboto), создающие ощущение стерильности и доверия. Крупная типографика."
