name: "Fitness Gym & Yoga Studio"
industry: "sports_fitness"
description: "Система продажи абонементов, контроль посещаемости и онлайн-запись на групповые тренировки."

modules:
  - id: "memberships"
    name: "Менеджер Абонементов"
    type: "frontend"
    features: 
      - "Индикация активных/просроченных абонементов у клиента"
      - "Продажа 'Разовых посещений' и 'Подписок' (Безлимит, 10 занятий)"
      - "Интерфейс Чекина (Check-in) на ресепшене — поиск по Фамилии/Телефону"
      
  - id: "group_classes"
    name: "Групповые Тренировки"
    type: "frontend"
    features: 
      - "Расписание занятий (Yoga, Crossfit, Бокс)"
      - "Лимит мест на занятие (Контроль Overbooking-а)"
      - "QR-код для быстрой отметки пришедших"

  - id: "gym_db"
    name: "БД Фитнес-клуба"
    type: "backend_db"
    models:
      - "Member (Имя, Телефон, Фото)"
      - "Subscription (Member_id, Тип, Дата окончания, Остаток визитов)"
      - "ClassSession (Тренер, Время, Вместимость)"
      - "AttendanceTracking (Logs: Кто когда пришел)"

integrations:
  - id: "telegram_bot"
    name: "Бот Фитнес-Клуба"
    features:
      - "Присылает клиенту 'Ваш абонемент истекает через 3 дня'"
      - "Кнопка продления абонемента прямо в Телеграм"

ai_instructions:
  architecture: "React + FastAPI + SQLite"
  design_constraints: "Яркий и динамичный UI (Energetic/Modern). Использование неоновых градиентов (сине-фиолетовый, салатовый) на темном фоне. Диаграммы активности пользователей («тепловые карты»)."
