name: "Auto Repair Shop Management (СТО & Гараж)"
industry: "auto_services"
description: "CRM для СТО (Автосервиса). Ведение машин, заказ нарядов (смет), постов ремонта и запчастей."

modules:
  - id: "service_tickets"
    name: "Доска Заказ-нарядов"
    type: "frontend"
    features: 
      - "Канбан-доска статусов (В ожидании -> В работе -> Ожидание З/Ч -> Готов к выдаче)"
      - "Калькулятор сметы (Работа мастера + Наценка на запчасти)"
      - "История ремонтов по VIN-коду машины"
      
  - id: "garage_planning"
    name: "Планировщик постов (Подъемники)"
    type: "frontend"
    features: 
      - "Timeline-просмотр занятости подъемников (Пост 1, Пост 2)"
      - "Назначение механиков на задачу"

  - id: "auto_db"
    name: "БД СТО"
    type: "backend_db"
    models:
      - "Customer (ФИО, Телефон)"
      - "Vehicle (VIN, Марка, Год, Госномер, Client_id)"
      - "ServiceOrder (Номер наряда, Статус, Механик, Сумма)"
      - "OrderItem (Тип: 'Работа' или 'Запчасть')"

integrations:
  - id: "telegram_bot"
    name: "Бот Автосервиса"
    features:
      - "Авто-отправка клиенту статуса 'Ваш автомобиль готов к выдаче, сумма к оплате: ХХХ'"
      - "Пинг механику о новых задачах"

ai_instructions:
  architecture: "React + FastAPI + SQLite"
  design_constraints: "Брутальный, контрастный дизайн (Industrial). Темный фон, элементы желтого/оранжевого цвета. Интерфейс должен хорошо читаться с грязными руками/в гараже, крупные элементы."
